<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FinSphere — AI Financial OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#090910;--bg2:#101018;--bg3:#181824;
  --card:#13131c;--card2:#1b1b28;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eeeef8;--text2:#7777aa;--text3:#444466;
  --accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00cec9;--green2:#55efc4;
  --red:#e84393;--orange:#fdcb6e;--blue:#74b9ff;--pink:#fd79a8;
  --glow:rgba(108,92,231,0.12);
  --r:16px;--rs:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
::selection{background:rgba(108,92,231,0.3)}
button,input,select,textarea{font-family:'DM Sans',sans-serif}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
@keyframes slideInR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.page{padding:24px 28px;animation:fadeUp 0.35s ease}

/* grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}

/* tag */
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.tag-p{background:rgba(108,92,231,.12);color:var(--accent2)}
.tag-g{background:rgba(85,239,196,.12);color:var(--green2)}
.tag-r{background:rgba(232,67,147,.12);color:var(--red)}
.tag-b{background:rgba(116,185,255,.12);color:var(--blue)}
.tag-o{background:rgba(253,203,110,.12);color:var(--orange)}

/* btn */
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:var(--rs);font-family:'DM Sans';font-weight:500;cursor:pointer;transition:all .18s;font-size:14px;padding:10px 18px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}.btn-outline:hover{background:var(--bg3)}
.btn-ghost{background:transparent;color:var(--text2)}.btn-ghost:hover{color:var(--text)}
.btn-danger{background:rgba(232,67,147,.12);color:var(--red);border:1px solid rgba(232,67,147,.2)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-lg{padding:13px 24px;font-size:15px}

/* input */
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--accent)}
.lbl{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block}

/* progress */
.prog{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* tx item */
.tx{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid var(--border);animation:fadeUp .3s ease both}
.tx:last-child{border-bottom:none}
.tx-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--text2);margin-top:2px}
.tx-amt{font-family:'Syne';font-weight:700;font-size:15px;color:var(--red);flex-shrink:0}

/* modal overlay */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-box{background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:scaleIn .2s ease;box-shadow:0 24px 80px rgba(0,0,0,.6)}

/* sidebar */
.sidebar{width:68px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:4px;position:fixed;top:0;left:0;bottom:0;z-index:100}
.nav-btn{width:42px;height:42px;border-radius:11px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .18s;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--glow);color:var(--accent2)}
.nav-bar{position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 3px 3px 0}
.tooltip{position:absolute;left:54px;background:var(--card2);color:var(--text);padding:5px 10px;border-radius:8px;font-size:12px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;border:1px solid var(--border2);z-index:200;font-family:'Syne'}
.nav-btn:hover .tooltip{opacity:1}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:17px 28px;border-bottom:1px solid var(--border);background:rgba(9,9,16,.86);backdrop-filter:blur(16px);position:sticky;top:0;z-index:50}

/* insight card */
.insight{background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(253,121,168,.06));border:1px solid rgba(108,92,231,.15);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}

/* wallet card */
.wcard{background:linear-gradient(135deg,#4a3fcb,#7c3fa0,#c2185b);border-radius:22px;padding:28px;color:#fff;position:relative;overflow:hidden;box-shadow:0 16px 48px rgba(74,63,203,.35)}
.wcard::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.wcard::after{content:'';position:absolute;right:30px;bottom:-60px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05)}

/* toast */
.toast{position:fixed;bottom:28px;right:28px;z-index:9999;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;animation:slideInR .25s ease;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.3)}

/* chat bubble */
.bubble-ai{background:var(--card2);border:1px solid var(--border2);border-radius:16px 16px 16px 4px;color:var(--text)}
.bubble-user{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px}

/* table */
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
td{padding:13px 12px}
tr{border-bottom:1px solid var(--border)}
tr:last-child{border-bottom:none}

/* stat-card */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;animation:fadeUp .4s ease both}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-family:'Syne';font-size:26px;font-weight:800;margin-top:6px}
.stat-chg{font-size:13px;margin-top:4px;display:flex;align-items:center;gap:4px}
.up{color:var(--green2)}.down{color:var(--red)}.neutral{color:var(--text2)}

@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}.page{padding:14px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,createContext,useContext,useMemo}=React;

/* ─── helpers ─── */
const uuid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const fmt=(d)=>new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
const fmtAmt=(n)=>Number(n).toLocaleString('en-IN');

/* ─── CAT META ─── */
const CAT_META={
  Food:         {icon:'🍔',color:'#fdcb6e'},
  Travel:       {icon:'🚗',color:'#74b9ff'},
  Bills:        {icon:'⚡',color:'#ffeaa7'},
  Entertainment:{icon:'🎬',color:'#e84393'},
  Health:       {icon:'💊',color:'#00cec9'},
  Shopping:     {icon:'🛒',color:'#a29bfe'},
  Education:    {icon:'📚',color:'#55efc4'},
  Other:        {icon:'💸',color:'#636e72'},
};
const CATS=Object.keys(CAT_META);

/* ─── INITIAL DATA ─── */
const INIT_EXP=[
  {id:uuid(),name:'Zomato Order',     cat:'Food',         amount:485, date:'2026-03-16'},
  {id:uuid(),name:'Uber Ride',        cat:'Travel',       amount:230, date:'2026-03-16'},
  {id:uuid(),name:'Electricity Bill', cat:'Bills',        amount:1840,date:'2026-03-15'},
  {id:uuid(),name:'Netflix',          cat:'Entertainment',amount:649, date:'2026-03-14'},
  {id:uuid(),name:'D-Mart Grocery',   cat:'Food',         amount:2350,date:'2026-03-13'},
  {id:uuid(),name:'Gym Membership',   cat:'Health',       amount:1500,date:'2026-03-12'},
  {id:uuid(),name:'Airtel Recharge',  cat:'Bills',        amount:599, date:'2026-03-11'},
  {id:uuid(),name:'BookMyShow',       cat:'Entertainment',amount:350, date:'2026-03-10'},
  {id:uuid(),name:'Amazon Order',     cat:'Shopping',     amount:1200,date:'2026-03-09'},
  {id:uuid(),name:'Yoga Class',       cat:'Health',       amount:800, date:'2026-03-08'},
  {id:uuid(),name:'Swiggy Dinner',    cat:'Food',         amount:340, date:'2026-03-07'},
  {id:uuid(),name:'Metro Card',       cat:'Travel',       amount:200, date:'2026-03-06'},
];

/* ─── CONTEXT ─── */
const Ctx=createContext(null);

function AppProvider({children}){
  const [expenses,setExpenses]=useState(INIT_EXP);
  const [income,setIncome]=useState(68000);
  const [budget,setBudget]=useState(25000);
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);

  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type,id:Date.now()});
    setTimeout(()=>setToast(null),3000);
  },[]);

  const addExpense=useCallback((data)=>{
    const meta=CAT_META[data.cat]||CAT_META.Other;
    setExpenses(p=>[{...data,id:uuid(),icon:meta.icon,color:meta.color},...p]);
    showToast(`"${data.name}" added ✓`);
  },[showToast]);

  const updateExpense=useCallback((id,data)=>{
    const meta=CAT_META[data.cat]||CAT_META.Other;
    setExpenses(p=>p.map(e=>e.id===id?{...e,...data,icon:meta.icon,color:meta.color}:e));
    showToast(`"${data.name}" updated ✓`);
  },[showToast]);

  const deleteExpense=useCallback((id)=>{
    const exp=expenses.find(e=>e.id===id);
    setExpenses(p=>p.filter(e=>e.id!==id));
    showToast(`"${exp?.name}" deleted`,'error');
  },[expenses,showToast]);

  const totalSpent=useMemo(()=>expenses.reduce((s,e)=>s+e.amount,0),[expenses]);
  const savings=income-totalSpent;
  const savingsRate=income>0?((savings/income)*100).toFixed(1):0;
  const budgetLeft=budget-totalSpent;

  const byCategory=useMemo(()=>
    Object.entries(expenses.reduce((acc,e)=>{acc[e.cat]=(acc[e.cat]||0)+e.amount;return acc},{}))
    .map(([cat,amount])=>({cat,amount,...CAT_META[cat]}))
    .sort((a,b)=>b.amount-a.amount)
  ,[expenses]);

  /* last 30 days daily */
  const dailySpending=useMemo(()=>{
    const days={};
    const now=new Date('2026-03-18');
    for(let i=29;i>=0;i--){
      const d=new Date(now);d.setDate(d.getDate()-i);
      days[d.toISOString().slice(0,10)]=0;
    }
    expenses.forEach(e=>{if(days[e.date]!==undefined)days[e.date]+=e.amount});
    return Object.entries(days).map(([date,amount])=>({date,amount}));
  },[expenses]);

  const weeklySpending=useMemo(()=>dailySpending.slice(-7),[dailySpending]);

  const monthlySpending=useMemo(()=>{
    const months={};
    expenses.forEach(e=>{const m=e.date.slice(0,7);months[m]=(months[m]||0)+e.amount});
    return Object.entries(months).sort(([a],[b])=>a.localeCompare(b))
      .map(([m,amount])=>({label:new Date(m+'-01').toLocaleString('default',{month:'short',year:'2-digit'}),amount}));
  },[expenses]);

  return <Ctx.Provider value={{
    expenses,income,budget,page,toast,
    setPage,setIncome,setBudget,
    addExpense,updateExpense,deleteExpense,
    totalSpent,savings,savingsRate,budgetLeft,
    byCategory,weeklySpending,monthlySpending,dailySpending,
    showToast,
  }}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

/* ─── CHART WRAPPERS ─── */
function useChart(ref,build,deps){
  const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current){inst.current.destroy();inst.current=null;}
    inst.current=new Chart(ref.current,build());
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },deps);
}

const TICK_STYLE={color:'#7777aa',font:{size:11,family:'DM Sans'}};
const GRID_STYLE={color:'rgba(255,255,255,0.04)'};
const TIP_STYLE={backgroundColor:'#1b1b28',borderColor:'rgba(255,255,255,0.1)',borderWidth:1};

function LineChart({data,labels,color='#6c5ce7',height=180}){
  const ref=useRef(null);
  useChart(ref,()=>({
    type:'line',
    data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'18',borderWidth:2.5,fill:true,tension:0.45,pointRadius:3,pointBackgroundColor:color,pointBorderColor:'transparent',pointHoverRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TIP_STYLE,callbacks:{label:c=>` ₹${c.raw.toLocaleString()}`}}},
      scales:{x:{grid:GRID_STYLE,ticks:TICK_STYLE},y:{grid:GRID_STYLE,ticks:{...TICK_STYLE,callback:v=>'₹'+(v>=1000?(v/1000).toFixed(0)+'k':v)}}}}
  }),[data,labels,color]);
  return <div style={{position:'relative',height}}><canvas ref={ref}/></div>;
}

function BarChart({data,labels,height=180}){
  const ref=useRef(null);
  useChart(ref,()=>({
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:data.map((_,i)=>`hsla(${250+i*20},75%,68%,0.8)`),borderRadius:7,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TIP_STYLE,callbacks:{label:c=>` ₹${c.raw.toLocaleString()}`}}},
      scales:{x:{grid:{display:false},ticks:TICK_STYLE},y:{grid:GRID_STYLE,ticks:{...TICK_STYLE,callback:v=>'₹'+(v>=1000?(v/1000).toFixed(0)+'k':v)}}}}
  }),[data,labels]);
  return <div style={{position:'relative',height}}><canvas ref={ref}/></div>;
}

function DonutChart({data,labels,colors,height=200}){
  const ref=useRef(null);
  useChart(ref,()=>({
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'72%',
      plugins:{legend:{display:false},tooltip:{...TIP_STYLE,callbacks:{label:c=>` ₹${c.raw.toLocaleString()}`}}}}
  }),[data,labels,colors]);
  return <div style={{position:'relative',height}}><canvas ref={ref}/></div>;
}

/* ─── UI COMPONENTS ─── */
function StatCard({label,value,change,dir,sub,accent,delay=0}){
  return(
    <div className="stat-card" style={{animationDelay:`${delay}s`}}>
      <div className="stat-lbl">{label}</div>
      <div className="stat-val" style={{color:accent||'var(--text)'}}>{value}</div>
      {change&&<div className={`stat-chg ${dir||'neutral'}`}>
        <span>{dir==='up'?'↑':dir==='down'?'↓':'·'} {change}</span>
        {sub&&<span style={{color:'var(--text2)',fontWeight:400}}> {sub}</span>}
      </div>}
    </div>
  );
}

function SectionHeader({title,action}){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
      <div style={{fontFamily:'Syne',fontSize:15,fontWeight:700}}>{title}</div>
      {action}
    </div>
  );
}

function ProgBar({value,max,color}){
  const pct=Math.min(100,Math.max(0,(value/max)*100));
  return(
    <div className="prog">
      <div className="prog-fill" style={{width:`${pct}%`,background:color||'linear-gradient(90deg,var(--accent),var(--pink))'}}/>
    </div>
  );
}

function TxItem({tx,onEdit,onDelete}){
  return(
    <div className="tx">
      <div className="tx-ico" style={{background:(tx.color||'#888')+'22'}}>{tx.icon||'💸'}</div>
      <div className="tx-info">
        <div className="tx-name">{tx.name}</div>
        <div className="tx-meta">{tx.cat} · {fmt(tx.date)}</div>
      </div>
      <div style={{textAlign:'right'}}>
        <div className="tx-amt">−₹{fmtAmt(tx.amount)}</div>
        {(onEdit||onDelete)&&<div style={{display:'flex',gap:4,marginTop:4,justifyContent:'flex-end'}}>
          {onEdit&&<button onClick={()=>onEdit(tx)} style={{background:'rgba(162,155,254,0.1)',color:'var(--accent2)',border:'none',borderRadius:6,padding:'3px 9px',fontSize:11,cursor:'pointer',fontWeight:600}}>Edit</button>}
          {onDelete&&<button onClick={()=>onDelete(tx.id)} style={{background:'rgba(232,67,147,0.1)',color:'var(--red)',border:'none',borderRadius:6,padding:'3px 9px',fontSize:11,cursor:'pointer',fontWeight:600}}>Del</button>}
        </div>}
      </div>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <div style={{fontFamily:'Syne',fontSize:18,fontWeight:700}}>{title}</div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',border:'none',background:'var(--bg3)',color:'var(--text2)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({msg,type}){
  if(!msg)return null;
  const isErr=type==='error';
  return(
    <div className="toast" style={{
      background:isErr?'rgba(232,67,147,0.15)':'rgba(85,239,196,0.12)',
      border:`1px solid ${isErr?'rgba(232,67,147,0.3)':'rgba(85,239,196,0.25)'}`,
      color:isErr?'var(--red)':'var(--green2)',
    }}>{isErr?'✕ ':'✓ '}{msg}</div>
  );
}

function EmptyState({msg='No data yet',icon='📭'}){
  return(
    <div style={{height:180,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--text2)',gap:8}}>
      <span style={{fontSize:32}}>{icon}</span>
      <span style={{fontSize:14}}>{msg}</span>
    </div>
  );
}

/* ─── EXPENSE FORM ─── */
function ExpenseForm({onClose,editItem=null}){
  const {addExpense,updateExpense}=useApp();
  const [form,setForm]=useState(editItem?{name:editItem.name,amount:String(editItem.amount),cat:editItem.cat,date:editItem.date}:{name:'',amount:'',cat:'Food',date:new Date().toISOString().slice(0,10)});
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const submit=(e)=>{
    e.preventDefault();
    if(!form.name.trim())return setErr('Enter a description.');
    if(!form.amount||+form.amount<=0)return setErr('Enter a valid amount.');
    if(!form.date)return setErr('Pick a date.');
    setErr('');
    const payload={...form,amount:+form.amount};
    editItem?updateExpense(editItem.id,payload):addExpense(payload);
    onClose();
  };

  return(
    <Modal title={editItem?'✏️ Edit Expense':'+ Add Expense'} onClose={onClose}>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
        {/* Category quick-pick */}
        <div>
          <span className="lbl">Category</span>
          <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
            {CATS.map(c=>(
              <button key={c} type="button" onClick={()=>set('cat',c)} style={{
                display:'flex',alignItems:'center',gap:6,padding:'7px 13px',
                borderRadius:10,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,transition:'all .15s',
                background:form.cat===c?'var(--accent)':'var(--bg3)',
                color:form.cat===c?'#fff':'var(--text2)',
              }}>{CAT_META[c].icon} {c}</button>
            ))}
          </div>
        </div>

        <div>
          <label className="lbl">Description</label>
          <input className="inp" value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Zomato dinner" required/>
        </div>

        <div className="g2" style={{gap:12}}>
          <div>
            <label className="lbl">Amount (₹)</label>
            <input className="inp" type="number" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0" required/>
          </div>
          <div>
            <label className="lbl">Date</label>
            <input className="inp" type="date" value={form.date} onChange={e=>set('date',e.target.value)} required/>
          </div>
        </div>

        {err&&<div style={{fontSize:13,color:'var(--red)',background:'rgba(232,67,147,.08)',padding:'10px 14px',borderRadius:8}}>⚠ {err}</div>}

        <div style={{display:'flex',gap:10,marginTop:4}}>
          <button type="button" className="btn btn-outline" style={{flex:1,justifyContent:'center'}} onClick={onClose}>Cancel</button>
          <button type="submit" className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>{editItem?'Save Changes':'Add Expense'}</button>
        </div>
      </form>
    </Modal>
  );
}

/* ════════════════════════════════════════════
   PAGE: EXPENSES (full CRUD)
════════════════════════════════════════════ */
function Expenses(){
  const {expenses,deleteExpense}=useApp();
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('date-desc');
  const [confirm,setConfirm]=useState(null);

  const filtered=useMemo(()=>{
    let list=expenses;
    if(filter!=='All')list=list.filter(e=>e.cat===filter);
    if(search.trim())list=list.filter(e=>e.name.toLowerCase().includes(search.toLowerCase()));
    const [key,dir]=sort.split('-');
    return [...list].sort((a,b)=>{
      const av=key==='date'?a.date:a.amount,bv=key==='date'?b.date:b.amount;
      return dir==='desc'?(bv>av?1:-1):(av>bv?1:-1);
    });
  },[expenses,filter,search,sort]);

  const total=filtered.reduce((s,e)=>s+e.amount,0);
  const handleEdit=(tx)=>{setEditItem(tx);setShowForm(true);};
  const handleDelete=(id)=>setConfirm(id);
  const confirmDel=()=>{deleteExpense(confirm);setConfirm(null);};

  return(
    <div className="page">
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontFamily:'Syne',fontSize:15,fontWeight:700}}>
            {filtered.length} transaction{filtered.length!==1?'s':''}
            <span style={{color:'var(--accent2)',marginLeft:8}}>₹{fmtAmt(total)}</span>
          </div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Manage all your expenses</div>
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditItem(null);setShowForm(true);}}>+ Add Expense</button>
      </div>

      {/* Filter card */}
      <div className="card" style={{marginBottom:16,padding:16}}>
        <div style={{display:'flex',gap:12,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{flex:2,minWidth:180}}>
            <label className="lbl">Search</label>
            <input className="inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search expenses..."/>
          </div>
          <div style={{flex:1,minWidth:150}}>
            <label className="lbl">Sort By</label>
            <select className="inp" value={sort} onChange={e=>setSort(e.target.value)}>
              <option value="date-desc">Newest First</option>
              <option value="date-asc">Oldest First</option>
              <option value="amount-desc">Highest Amount</option>
              <option value="amount-asc">Lowest Amount</option>
            </select>
          </div>
          {(search||sort!=='date-desc'||filter!=='All')&&
            <button className="btn btn-ghost btn-sm" onClick={()=>{setSearch('');setSort('date-desc');setFilter('All');}}>Clear</button>
          }
        </div>
        {/* Cat chips */}
        <div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:12}}>
          {['All',...CATS].map(c=>(
            <button key={c} onClick={()=>setFilter(c)} style={{
              display:'flex',alignItems:'center',gap:5,
              padding:'5px 12px',borderRadius:20,border:'none',cursor:'pointer',
              background:filter===c?'var(--accent)':'var(--bg3)',
              color:filter===c?'#fff':'var(--text2)',
              fontSize:12,fontWeight:600,transition:'all .15s',
            }}>{c!=='All'&&CAT_META[c]?.icon} {c}</button>
          ))}
        </div>
      </div>

      {/* List */}
      <div className="card">
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'48px 0',color:'var(--text2)',display:'flex',flexDirection:'column',gap:12,alignItems:'center'}}>
            <span style={{fontSize:40}}>🔍</span>
            <div style={{fontWeight:600}}>No expenses found</div>
            <div style={{fontSize:13}}>Try changing filters or add a new expense.</div>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(true)}>+ Add Expense</button>
          </div>
        ):(
          <div style={{maxHeight:520,overflowY:'auto'}}>
            {filtered.map(tx=><TxItem key={tx.id} tx={tx} onEdit={handleEdit} onDelete={handleDelete}/>)}
          </div>
        )}
      </div>

      {/* Delete confirm */}
      {confirm&&(
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setConfirm(null)}}>
          <div className="modal-box" style={{maxWidth:360,textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <div style={{fontFamily:'Syne',fontSize:17,fontWeight:700,marginBottom:8}}>Delete Expense?</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>
              "{expenses.find(e=>e.id===confirm)?.name}" will be permanently removed.
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-outline" onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={confirmDel}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {showForm&&<ExpenseForm onClose={()=>{setShowForm(false);setEditItem(null);}} editItem={editItem}/>}
    </div>
  );
}

function buildAIReply(msg,ctx){
  const m=msg.toLowerCase();
  const {totalSpent,income,savingsRate,budgetLeft,byCategory,expenses,budget}=ctx;
  if(m.includes('food')||m.includes('eat')||m.includes('zomato')||m.includes('swiggy')){
    const fa=byCategory.find(c=>c.cat==='Food')?.amount||0;
    return `🍽️ Food Spending\n\nYou've spent ₹${fmtAmt(fa)} on food (${((fa/totalSpent)*100||0).toFixed(0)}% of total).\n\nTips to save:\n• Cook at home 3–4 days/week → saves ₹800–1,200/mo\n• Use Zomato Pro / Swiggy One for discounts\n• Batch grocery shop on weekends`;
  }
  if(m.includes('save')||m.includes('saving')){
    return `💡 Savings Plan\n\nYou're saving ${savingsRate}% of income.\nTarget: 20% rule → ₹${fmtAmt(income*0.2)}/month.\n\nQuick wins:\n• Cut subscriptions → saves ₹500–900/mo\n• Reduce dining out by 30%\n• Automate SIP on salary day`;
  }
  if(m.includes('invest')||m.includes('sip')||m.includes('stock')||m.includes('portfolio')){
    return `📈 Investment Advice\n\nSuggested allocation:\n• 50% — NIFTY 50 Index Fund (12% avg return)\n• 20% — Mid-cap Fund\n• 20% — US Tech ETF (diversification)\n• 10% — Emergency fund / Gold\n\n₹5,000/month SIP → ₹9.2L in 10 years`;
  }
  if(m.includes('budget')||m.includes('spend')||m.includes('overspend')){
    const pct=((totalSpent/budget)*100).toFixed(0);
    return `💰 Budget Status\n\nUsed ${pct}% of ₹${fmtAmt(budget)} budget.\n\nTop categories:\n${byCategory.slice(0,4).map(c=>`• ${c.icon} ${c.cat}: ₹${fmtAmt(c.amount)}`).join('\n')}\n\n${budgetLeft<0?`⚠️ Over by ₹${fmtAmt(Math.abs(budgetLeft))}!`:`✅ ₹${fmtAmt(budgetLeft)} remaining.`}`;
  }
  if(m.includes('sub')||m.includes('netflix')){
    return `📊 Subscription Review\n\nPotential duplicates:\n• Netflix + Hotstar = overlap → cancel one (save ₹899)\n• Review Amazon Prime usage\n• Notion free tier may suffice\n\nEstimated savings: ₹900–1,500/month`;
  }
  if(m.includes('tip')||m.includes('advice')||m.includes('suggest')){
    return `🎯 Financial Tips\n\n1. 50/30/20 Rule: needs / wants / savings\n2. Emergency Fund: 3–6 months of expenses\n3. Automate SIPs on salary day\n4. Review spending every evening (5 min habit)\n5. Use ₹1.5L 80C deductions (ELSS, PPF)`;
  }
  if(m.includes('top')||m.includes('most')||m.includes('biggest')){
    return `🔍 Top Spending Categories\n\n${byCategory.slice(0,5).map((c,i)=>`${i+1}. ${c.icon} ${c.cat} — ₹${fmtAmt(c.amount)} (${((c.amount/totalSpent)*100||0).toFixed(0)}%)`).join('\n')}`;
  }
  if(m.includes('hello')||m.includes('hi')||m.includes('hey')){
    return `👋 Hello! I'm FinAI.\n\nYou have ${expenses.length} transactions totaling ₹${fmtAmt(totalSpent)} this month.\n\nAsk me about:\n• Spending patterns\n• Savings strategies\n• Investment advice\n• Budget analysis`;
  }
  return `I've analyzed your finances:\n\n• ${expenses.length} transactions → ₹${fmtAmt(totalSpent)} spent\n• Savings rate: ${savingsRate}%\n• Budget usage: ${((totalSpent/budget)*100).toFixed(0)}%\n\nTry: "food spending", "save more", "investment tips", "budget status"`;
}

function AIChat(){
  const ctx=useApp();
  const {expenses,totalSpent,byCategory}=ctx;
  const [msgs,setMsgs]=useState([{id:1,role:'ai',text:`👋 Hi! I'm FinAI, your personal financial assistant.\n\nYou have ${expenses.length} transactions totaling ₹${fmtAmt(totalSpent)} this month.\n\nAsk me anything about your finances!`}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=async(text)=>{
    const msg=(text||input).trim();if(!msg)return;
    setInput('');
    setMsgs(p=>[...p,{id:Date.now(),role:'user',text:msg}]);
    setLoading(true);
    await new Promise(r=>setTimeout(r,500+Math.random()*400));
    setMsgs(p=>[...p,{id:Date.now()+1,role:'ai',text:buildAIReply(msg,ctx)}]);
    setLoading(false);
  };

  const renderText=(txt)=>txt.split('\n').map((line,i)=><div key={i} style={{marginBottom:line===''?3:0}}>{line}</div>);

  return(
    <div className="page" style={{paddingBottom:0}}>
      <div style={{display:'flex',gap:16,height:'calc(100vh - 140px)'}}>
        {/* Chat */}
        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
          <div className="card" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',padding:16}}>
            <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:13,paddingBottom:8}}>
              {msgs.map(m=>(
                <div key={m.id} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',gap:8,alignItems:'flex-start'}}>
                  {m.role==='ai'&&<div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--pink))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,fontSize:14}}>✦</div>}
                  <div className={`bubble-${m.role==='user'?'user':'ai'}`} style={{maxWidth:'72%',padding:'11px 15px',fontSize:13.5,lineHeight:1.65,animation:'fadeUp .25s ease'}}>
                    {renderText(m.text)}
                  </div>
                </div>
              ))}
              {loading&&(
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--pink))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>✦</div>
                  <div className="bubble-ai" style={{padding:'13px 17px',display:'flex',gap:5}}>
                    {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',animation:`bounce .9s ease ${i*.18}s infinite`}}/>)}
                  </div>
                </div>
              )}
              <div ref={bottomRef}/>
            </div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:13,marginTop:8,display:'flex',gap:8}}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
                placeholder="Ask about your finances..." className="inp" style={{flex:1}}/>
              <button onClick={()=>send()} disabled={loading||!input.trim()}
                style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:12,padding:'11px 18px',cursor:'pointer',fontWeight:700,fontSize:16,opacity:loading?.5:1}}>→</button>
            </div>
          </div>
        </div>

        {/* Sidebar */}
        <div style={{width:230,display:'flex',flexDirection:'column',gap:14}}>
          <div className="card">
            <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,marginBottom:11}}>Quick Questions</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {SUGGESTIONS.map((s,i)=>(
                <button key={i} onClick={()=>send(s)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',color:'var(--text2)',fontSize:12,cursor:'pointer',textAlign:'left',fontWeight:500,transition:'all .15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent2)'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text2)'}}>{s}</button>
              ))}
            </div>
          </div>
          <div className="card">
            <div style={{fontFamily:'Syne',fontSize:14,fontWeight:700,marginBottom:11}}>📊 Quick Stats</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                {l:'Monthly Spend',v:`₹${fmtAmt(totalSpent)}`},
                {l:'Transactions', v:expenses.length},
                {l:'Top Category', v:byCategory[0]?`${byCategory[0].icon} ${byCategory[0].cat}`:'—'},
                {l:'Savings Rate', v:`${ctx.savingsRate}%`},
                {l:'Budget Left',  v:`₹${fmtAmt(Math.abs(ctx.budgetLeft))}`},
              ].map((s,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{color:'var(--text2)'}}>{s.l}</span>
                  <span style={{fontWeight:700}}>{s.v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   GLOW BACKGROUND
════════════════════════════════════════════ */
function GlowBg(){
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,overflow:'hidden'}}>
      <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',background:'var(--accent)',filter:'blur(120px)',opacity:.07,top:-120,left:40}}/>
      <div style={{position:'absolute',width:400,height:400,borderRadius:'50%',background:'var(--pink)',filter:'blur(100px)',opacity:.06,bottom:60,right:80}}/>
      <div style={{position:'absolute',width:280,height:280,borderRadius:'50%',background:'var(--green)',filter:'blur(90px)',opacity:.05,top:'45%',left:'35%'}}/>
    </div>
  );
}

/* ════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════ */
function Pages(){
  const {page,toast}=useApp();
  const map={dashboard:<Dashboard/>,expenses:<Expenses/>,charts:<ChartsPage/>,wallet:<Wallet/>,investments:<Investments/>,subscriptions:<Subscriptions/>,ai:<AIChat/>};
  return<>{map[page]||<Dashboard/>}{toast&&<Toast msg={toast.msg} type={toast.type}/>}</>;
}

function App(){
  return(
    <AppProvider>
      <GlowBg/>
      <div style={{display:'flex',minHeight:'100vh',position:'relative',zIndex:1}}>
        <Sidebar/>
        <div style={{marginLeft:68,flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <Topbar/>
          <main style={{flex:1,overflowY:'auto'}}>
            <Pages/>
          </main>
        </div>
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
