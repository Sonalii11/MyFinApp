<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FinSphere — Investments</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div id="bg-glow" class="bg-glow"></div>
<div class="app-shell">
  <nav id="sidebar" class="sidebar"></nav>
  <div class="main-content">
    <div id="topbar" class="topbar"></div>
    <div class="page z1">

      <!-- Portfolio Stats -->
      <div style="display:flex;gap:16px;margin-bottom:24px">
        <div class="stat-card" style="flex:2">
          <div class="stat-label">Portfolio Value</div>
          <div class="stat-value syne" style="font-size:32px">₹5,31,455</div>
          <div class="stat-change up">↑ +₹23,890 (+4.71%) this month</div>
        </div>
        <div class="stat-card" style="flex:1">
          <div class="stat-label">Invested</div>
          <div class="syne neutral" style="font-size:22px;font-weight:700">₹4,20,000</div>
        </div>
        <div class="stat-card" style="flex:1">
          <div class="stat-label">Total P&amp;L</div>
          <div class="syne up" style="font-size:22px;font-weight:700">+₹1,11,455</div>
        </div>
        <div class="stat-card" style="flex:1">
          <div class="stat-label">Returns</div>
          <div class="syne up" style="font-size:22px;font-weight:700">+26.5%</div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="grid-2 gap-16" style="margin-bottom:24px">
        <div class="card">
          <div class="sec-header">
            <span class="sec-title">Portfolio Growth</span>
            <span class="tag tag-green">1 Year</span>
          </div>
          <div class="chart-container">
          <canvas id="growthChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="sec-header"><span class="sec-title">Asset Allocation</span></div>
          <div style="display:flex;align-items:center;gap:20px">
            <div style="flex:1"><canvas id="allocChart" style="width:100%;height:200px"></canvas></div>
            <div id="allocLegend" style="display:flex;flex-direction:column;gap:10px"></div>
          </div>
        </div>
      </div>

      <!-- Holdings Table -->
      <div class="card">
        <div class="sec-header">
          <span class="sec-title">Holdings</span>
          <button class="btn btn-primary btn-sm">+ Buy / Sell</button>
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="border-bottom:1px solid var(--border)">
                <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Asset</th>
                <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Price</th>
                <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em">24h Change</th>
                <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Invested</th>
                <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Current Value</th>
                <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em">P&amp;L</th>
              </tr>
            </thead>
            <tbody id="holdingsBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
renderShell('investments', 'Investment Portfolio');

const STOCKS = [
  { tick:'RELIANCE', name:'Reliance Industries', price:2847.50,  change:+1.34, val:142375, color:'#4fc3f7' },
  { tick:'TCS',      name:'Tata Consultancy',    price:3912.00,  change:-0.72, val:195600, color:'#22d4a0' },
  { tick:'INFY',     name:'Infosys Ltd',         price:1450.25,  change:+2.18, val:72512,  color:'#a594fd' },
  { tick:'BTC',      name:'Bitcoin',             price:6847320,  change:+3.45, val:342366, color:'#f5a623' },
  { tick:'ETH',      name:'Ethereum',            price:283450,   change:-1.22, val:56690,  color:'#627EEA' },
];

// Holdings table
const body = document.getElementById('holdingsBody');
STOCKS.forEach(s => {
  const pnl = Math.round(s.val * (s.change / 100) * 5);
  const currentVal = Math.round(s.val * 1.265).toLocaleString();
  body.innerHTML += `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:14px 12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:10px;background:${s.color}20;display:flex;align-items:center;justify-content:center;color:${s.color};font-weight:700;font-size:12px">${s.tick.slice(0,3)}</div>
          <div>
            <div style="font-weight:600;font-size:14px">${s.tick}</div>
            <div style="font-size:12px;color:var(--text2)">${s.name}</div>
          </div>
        </div>
      </td>
      <td style="padding:14px 12px;font-family:'Syne',sans-serif;font-weight:600">₹${s.price.toLocaleString()}</td>
      <td style="padding:14px 12px">
        <span class="${s.change>0?'up':'down'}" style="font-weight:600">${s.change>0?'↑':'↓'} ${Math.abs(s.change)}%</span>
      </td>
      <td style="padding:14px 12px">₹${s.val.toLocaleString()}</td>
      <td style="padding:14px 12px;font-family:'Syne',sans-serif;font-weight:600">₹${currentVal}</td>
      <td style="padding:14px 12px" class="${pnl>0?'up':'down'}">${pnl>0?'+':''}${pnl.toLocaleString()}</td>
    </tr>`;
});

// Growth Line Chart
new Chart(document.getElementById('growthChart'), {
  type: 'line',
  data: {
    labels: ['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'],
    datasets: [{
      data: [420000,435000,410000,455000,448000,472000,490000,505000,498000,520000,515000,531455],
      borderColor: '#22d4a0', backgroundColor: '#22d4a018',
      borderWidth: 2, fill: true, tension: 0.4,
      pointRadius: 3, pointBackgroundColor: '#22d4a0'
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8888aa', font:{size:11} } },
      y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8888aa', font:{size:11} } }
    }
  }
});

// Allocation Donut
const allocLabels = ['Stocks','Crypto','Mutual Funds','Cash'];
const allocData   = [42,28,18,12];
const allocColors = ['#7c6dfa','#f5a623','#22d4a0','#4fc3f7'];

new Chart(document.getElementById('allocChart'), {
  type: 'doughnut',
  data: { labels: allocLabels, datasets: [{ data: allocData, backgroundColor: allocColors, borderWidth: 0, hoverOffset: 4 }] },
  options: {
    responsive: true, maintainAspectRatio: false, cutout: '72%',
    plugins: { legend: { display: false } }
  }
});

const legend = document.getElementById('allocLegend');
allocLabels.forEach((l,i) => {
  legend.innerHTML += `
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:12px;height:12px;border-radius:3px;background:${allocColors[i]}"></div>
      <span style="font-size:12px;color:var(--text2);width:90px">${l}</span>
      <span style="font-size:14px;font-weight:700;font-family:'Syne',sans-serif">${allocData[i]}%</span>
    </div>`;
});
</script>
</body>
</html>
