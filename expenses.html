<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FinSphere — Expense Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div id="bg-glow" class="bg-glow"></div>
<div class="app-shell">
  <nav id="sidebar" class="sidebar"></nav>
  <div class="main-content">
    <div id="topbar" class="topbar"></div>
    <div class="page z1">

      <!-- TOP ROW: Add Form + Monthly Chart -->
      <div class="grid-2 gap-16" style="margin-bottom:24px">

        <!-- Add Expense Form -->
        <div class="card">
          <div class="sec-title" style="margin-bottom:16px">+ Add Expense</div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="input-group">
              <div class="input-label">Description</div>
              <input id="desc" class="input" placeholder="e.g. Zomato dinner"/>
            </div>
            <div class="grid-2">
              <div class="input-group">
                <div class="input-label">Amount (₹)</div>
                <input id="amount" class="input" type="number" placeholder="0"/>
              </div>
              <div class="input-group">
                <div class="input-label">Date</div>
                <input id="date" class="input" type="date"/>
              </div>
            </div>
            <div class="input-group">
              <div class="input-label">Category</div>
              <select id="cat" class="select">
                <option>Food</option><option>Travel</option><option>Bills</option>
                <option>Entertainment</option><option>Health</option><option>Shopping</option>
              </select>
            </div>
            <button class="btn btn-primary w-full" onclick="addExpense()">Add Expense</button>
          </div>
        </div>

        <!-- Monthly Bar Chart -->
        <div class="card">
          <div class="sec-header">
            <span class="sec-title">Monthly Overview</span>
            <span class="tag tag-green">6 months</span>
          </div>
          <div class="chart-container">
          <canvas id="barChart"></canvas>
      </div>
          <div style="display:flex;gap:16px;margin-top:12px">
            <div>
              <div class="text-xs text2">Avg/month</div>
              <div class="syne" style="font-weight:700">₹12,159</div>
            </div>
            <div>
              <div class="text-xs text2">Highest</div>
              <div class="syne" style="font-weight:700;color:var(--red)">₹16,854</div>
            </div>
            <div>
              <div class="text-xs text2">This Month</div>
              <div class="syne" style="font-weight:700;color:var(--green)">₹14,500</div>
            </div>
          </div>
        </div>
      </div>

      <!-- All Expenses -->
      <div class="card">
        <div class="sec-header">
          <span class="sec-title">All Expenses · <span id="totalLabel" style="color:var(--accent2)">₹0</span></span>
          <div style="display:flex;gap:6px;flex-wrap:wrap" id="filterBtns"></div>
        </div>
        <div id="txList" style="max-height:380px;overflow-y:auto"></div>
      </div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
renderShell('expenses', 'Expense Tracker');

const CAT_ICONS  = { Food:'🍔', Travel:'🚗', Bills:'⚡', Entertainment:'🎬', Health:'💊', Shopping:'🛒' };
const CAT_COLORS = { Food:'#f5a623', Travel:'#4fc3f7', Bills:'#fbbf24', Entertainment:'#f05c7a', Health:'#22d4a0', Shopping:'#a594fd' };

let expenses = [
  { id:1, name:'Zomato Order',     cat:'Food',          amount:485,  date:'Mar 16', icon:'🍔', color:'#f5a623' },
  { id:2, name:'Uber Ride',        cat:'Travel',        amount:230,  date:'Mar 16', icon:'🚗', color:'#4fc3f7' },
  { id:3, name:'Electricity Bill', cat:'Bills',         amount:1840, date:'Mar 15', icon:'⚡', color:'#fbbf24' },
  { id:4, name:'Netflix',          cat:'Entertainment', amount:649,  date:'Mar 14', icon:'🎬', color:'#e50914' },
  { id:5, name:'D-Mart Grocery',   cat:'Food',          amount:2350, date:'Mar 13', icon:'🛒', color:'#22d4a0' },
  { id:6, name:'Gym Membership',   cat:'Health',        amount:1500, date:'Mar 12', icon:'💪', color:'#a594fd' },
  { id:7, name:'Airtel Recharge',  cat:'Bills',         amount:599,  date:'Mar 11', icon:'📱', color:'#f05c7a' },
  { id:8, name:'BookMyShow',       cat:'Entertainment', amount:350,  date:'Mar 10', icon:'🎭', color:'#ff6b35' },
];

let activeFilter = 'All';
const cats = ['All','Food','Travel','Bills','Entertainment','Health','Shopping'];

// Filter Buttons
const filterDiv = document.getElementById('filterBtns');
function renderFilters() {
  filterDiv.innerHTML = cats.map(c => `
    <button class="btn btn-sm ${activeFilter===c?'btn-primary':'btn-outline'}"
      onclick="setFilter('${c}')">${c}</button>
  `).join('');
}

function setFilter(c) { activeFilter = c; renderFilters(); renderList(); }

function renderList() {
  const filtered = activeFilter === 'All' ? expenses : expenses.filter(e => e.cat === activeFilter);
  const total = filtered.reduce((s,e) => s+e.amount, 0);
  document.getElementById('totalLabel').textContent = '₹' + total.toLocaleString();
  document.getElementById('txList').innerHTML = filtered.map(tx => `
    <div class="tx-item">
      <div class="tx-icon" style="background:${tx.color}20">${tx.icon}</div>
      <div class="tx-info">
        <div class="tx-name">${tx.name}</div>
        <div class="tx-meta">${tx.cat} · ${tx.date}</div>
      </div>
      <div style="text-align:right">
        <div class="tx-amount down">-₹${tx.amount.toLocaleString()}</div>
        <span class="tag tag-orange" style="font-size:10px;margin-top:4px">${tx.cat}</span>
      </div>
    </div>`).join('');
}

function addExpense() {
  const name   = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const cat    = document.getElementById('cat').value;
  const date   = document.getElementById('date').value || 'Mar 18';
  if (!name || !amount) return;
  expenses.unshift({ id: Date.now(), name, cat, amount, date, icon: CAT_ICONS[cat]||'💸', color: CAT_COLORS[cat]||'#888' });
  document.getElementById('desc').value   = '';
  document.getElementById('amount').value = '';
  renderList();
}

renderFilters();
renderList();

// Bar Chart
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: ['Oct','Nov','Dec','Jan','Feb','Mar'],
    datasets: [{
      data: [8200,12400,9800,16854,11200,14500],
      backgroundColor: '#7c6dfacc',
      borderRadius: 6, borderSkipped: false
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, ticks: { color: '#8888aa', font:{size:11} } },
      y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8888aa', font:{size:11} } }
    }
  }
});
</script>
</body>
</html>
